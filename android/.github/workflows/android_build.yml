name: FlashBrain Android CI

on:
  push:
    branches: [ "main" ] # Chạy khi bạn merge code vào nhánh main
  pull_request:
    branches: [ "main" ] # Chạy cả khi bạn tạo PR để kiểm tra xem code có lỗi build không

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Cách 1: Lưu file vào mục Artifacts (Dễ nhất, lần nào build cũng có)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashBrain-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      # Cách 2: Tự động tạo Release nếu bạn push một cái Tag (Ví dụ: git tag v1.0 && git push origin v1.0)
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}